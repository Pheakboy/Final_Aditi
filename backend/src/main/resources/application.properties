spring.application.name=backend

# ── Server port ────────────────────────────────────────────────────────────────
# PORT is injected automatically by Railway, Render, Fly.io, etc.
server.port=${PORT:8080}

# ── Database (Neon PostgreSQL) ─────────────────────────────────────────────────
# All values come from .env — see .env.example
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.hikari.data-source-properties.sslmode=${DB_SSL_MODE:require}
spring.datasource.hikari.maximum-pool-size=${DB_POOL_SIZE:5}
spring.datasource.hikari.minimum-idle=1
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000

# ── JPA / Hibernate ────────────────────────────────────────────────────────────
spring.jpa.open-in-view=false
spring.jpa.hibernate.ddl-auto=${DDL_AUTO:update}
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.show-sql=${SHOW_SQL:false}

# ── Jackson ────────────────────────────────────────────────────────────────────
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.serialization.write-date-timestamps-as-nanoseconds=false
spring.jackson.deserialization.read-date-timestamps-as-nanoseconds=false

# ── JWT ────────────────────────────────────────────────────────────────────────
jwt.secret=${JWT_SECRET}

# ── CORS ───────────────────────────────────────────────────────────────────────
cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:3000}

# ── Multipart file upload ──────────────────────────────────────────────────────
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# ── Logging ────────────────────────────────────────────────────────────────────
logging.level.org.springframework.security=${LOG_LEVEL_SECURITY:WARN}
logging.level.groupproject.backend=${LOG_LEVEL_APP:INFO}
logging.level.org.hibernate.SQL=${LOG_LEVEL_SQL:WARN}


