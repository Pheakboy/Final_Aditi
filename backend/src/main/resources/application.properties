spring.application.name=backend

# Default active profile (override with SPRING_PROFILES_ACTIVE env var in production)
spring.profiles.active=${SPRING_PROFILES_ACTIVE:dev}

# General JPA/Hibernate Configuration
spring.jpa.open-in-view=false

# Jackson - serialize dates as ISO-8601 strings (not arrays)
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.serialization.write-date-timestamps-as-nanoseconds=false
spring.jackson.deserialization.read-date-timestamps-as-nanoseconds=false

# JWT Configuration - Value from .env file (fallback for dev)
jwt.secret=${JWT_SECRET:devSecretKeyForLocalDevelopmentOnlyMustBe256BitsLong!!}

# CORS Configuration - Value from .env file
cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:5173}


