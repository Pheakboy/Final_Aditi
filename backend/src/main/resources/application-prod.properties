# Production Environment Configuration (Neon PostgreSQL)

# Database Configuration
# DB_URL format for Neon: jdbc:postgresql://ep-xxx-yyy.us-east-2.aws.neon.tech/neondb?sslmode=require
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# HikariCP - SSL required for Neon
spring.datasource.hikari.data-source-properties.sslmode=${DB_SSL_MODE:require}

# Connection pool tuning for Neon serverless
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.minimum-idle=1
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000

# JPA/Hibernate Configuration (Production)
spring.jpa.hibernate.ddl-auto=${DDL_AUTO:update}
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.show-sql=false

# H2 Console — disabled in production
spring.h2.console.enabled=false

# Production Logging
logging.level.org.springframework.security=WARN
logging.level.groupproject.backend=INFO
logging.level.org.hibernate.SQL=WARN