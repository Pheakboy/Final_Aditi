# Production Environment Configuration

# Database Configuration (PostgreSQL - Production)
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/additi_loan_app}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:password}
spring.datasource.hikari.data-source-properties.sslmode=${DB_SSL_MODE:disable}

# JPA/Hibernate Configuration (Production)
spring.jpa.hibernate.ddl-auto=${DDL_AUTO:update}
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.show-sql=false

# Production Logging
logging.level.org.springframework.security=WARN    
logging.level.groupproject.backend=INFO
logging.level.org.hibernate.SQL=WARN