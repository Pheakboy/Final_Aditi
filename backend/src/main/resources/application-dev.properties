# Development Environment Overrides
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# PostgreSQL Database - Neon (dev)
# Copy backend/.env.example → backend/.env and fill in your credentials.
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# HikariCP - SSL for Neon (set sslmode=require when using Neon)
spring.datasource.hikari.data-source-properties.sslmode=${DB_SSL_MODE:require}

# Connection pool tuning for Neon serverless
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.minimum-idle=1
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000

# Development Logging
logging.level.org.springframework.security=DEBUG
logging.level.groupproject.backend=DEBUG
